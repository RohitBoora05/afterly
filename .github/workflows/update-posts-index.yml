name: Update posts-index.json

on:
  push:
    paths:
      - 'content/posts/**.md'

jobs:
  regenerate-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate posts-index.json
        run: node scripts/generate-posts-index.js

      - name: Commit updated index
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/posts-index.json
          git diff --cached --quiet || git commit -m "chore: regenerate posts-index.json [skip ci]"
          git push
